name: C++ CI

on:
  push:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'img/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  test-python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install g++
      run: >-
        sudo apt-get update ;
        sudo apt-get install -y g++
    - name: Install fastavro
      run: pip install fastavro
    - name: Run tests
      run: make -C test SCHEMA=record.json test

  test-compiler:
    name: ${{ matrix.compiler }} / C++${{ matrix.std }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++-12, g++-13, g++-14, clang++]
        std: ["17", "20"]
    steps:
    - uses: actions/checkout@v6
    - name: Install compiler
      run: |
        sudo apt-get update
        PKG=${{ matrix.compiler }}
        [ "$PKG" = "clang++" ] && PKG=clang
        sudo apt-get install -y $PKG
    - name: Install fastavro
      run: pip install fastavro
    - name: Run tests
      run: >-
        make -C test SCHEMA=record.json test
        CXX=${{ matrix.compiler }}
        CXXFLAGS="-std=c++${{ matrix.std }} -Wall -Wextra -O2"
